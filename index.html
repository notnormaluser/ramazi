<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{background:#0f1117;}
:root{--bg:#0f1117;--surface:#181b24;--card:#1e2130;--border:#2a2d3e;--accent:#6c8ef5;--accent2:#a78bfa;--green:#34d399;--red:#f87171;--text:#e2e8f0;--muted:#64748b;--tag-bg:#252a3d;}
body{font-family:"Noto Sans Georgian",sans-serif;background:#0f1117;color:var(--text);min-height:100vh;}
.container{max-width:700px;margin:0 auto;padding:36px 20px;}
.header{margin-bottom:36px;}
.header h1{font-size:24px;font-weight:700;color:#6c8ef5;letter-spacing:-0.3px;margin-bottom:3px;}
.header p{font-size:13px;color:var(--muted);}
.header-divider{height:1px;background:linear-gradient(90deg,var(--accent),var(--accent2),transparent);margin-top:16px;}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.stat-value{font-size:20px;font-weight:700;line-height:1;margin-bottom:3px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.stat.correct .stat-value{color:var(--green);}
.stat.wrong   .stat-value{color:var(--red);}
.stat.score   .stat-value{color:var(--accent);}
.stat.prog    .stat-value{color:var(--accent2);}
.progress-wrap{background:var(--border);border-radius:4px;height:3px;margin-bottom:20px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s ease;}
.topic-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.topic-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:5px 13px;border-radius:20px;font-size:12px;font-family:"Noto Sans Georgian",sans-serif;cursor:pointer;transition:all .15s;font-weight:500;}
.topic-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:12px;animation:fadeUp .22s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.q-topic-tag{background:var(--tag-bg);color:var(--accent);border:1px solid rgba(108,142,245,.2);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.q-counter{font-size:11px;color:var(--muted);}
.q-text{font-size:17px;font-weight:600;line-height:1.65;color:var(--text);margin-bottom:20px;}
.options{display:grid;gap:8px;}
.option{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 16px;cursor:pointer;font-family:"Noto Sans Georgian",sans-serif;font-size:14px;color:var(--text);text-align:left;transition:all .15s;display:flex;align-items:center;gap:12px;line-height:1.5;}
.option:hover:not(:disabled){border-color:var(--accent);background:#252a3d;color:#fff;}
.option-letter{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:var(--muted);background:var(--bg);transition:all .15s;}
.option.correct{border-color:var(--green)!important;background:#0d2a1e!important;color:var(--green)!important;}
.option.correct .option-letter{border-color:var(--green);background:#0a2018;color:var(--green);}
.option.wrong{border-color:var(--red)!important;background:#2a0d0d!important;color:var(--red)!important;animation:shake .3s;}
.option.wrong .option-letter{border-color:var(--red);background:#200a0a;color:var(--red);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.option:disabled{cursor:not-allowed;}
.feedback{margin-top:14px;padding:13px 16px;border-radius:10px;font-size:13px;line-height:1.6;display:none;}
.feedback.show{display:block;}
.feedback.correct-fb{background:#0d2a1e;border:1px solid rgba(52,211,153,.25);color:#6ee7b7;}
.feedback.wrong-fb{background:#2a0d0d;border:1px solid rgba(248,113,113,.25);color:#fca5a5;}
.feedback strong{display:block;font-size:14px;margin-bottom:4px;}
.feedback .formula{display:inline-block;margin-top:6px;padding:4px 10px;background:rgba(255,255,255,.08);border-radius:6px;font-size:12px;font-weight:600;}
.next-btn{display:none;width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:"Noto Sans Georgian",sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .15s;}
.next-btn:hover{opacity:.85;}
.next-btn.show{display:block;animation:fadeUp .2s ease;}
.score-screen{display:none;text-align:center;padding:52px 32px;background:var(--card);border:1px solid var(--border);border-radius:14px;}
.score-screen.show{display:block;animation:fadeUp .3s ease;}
.score-emoji{font-size:52px;display:block;margin-bottom:14px;}
.score-number{font-size:64px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px;}
.score-label{color:var(--muted);font-size:14px;margin-bottom:20px;}
.fail-warning{margin:16px auto 24px;padding:18px 32px;background:#2d0000;border:3px solid #ff3333;border-radius:14px;color:#ff4444;font-size:26px;font-weight:900;letter-spacing:0.5px;animation:shake .5s ease;display:inline-block;text-shadow:0 0 20px rgba(255,50,50,.5);}
.restart-btn{padding:13px 32px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:"Noto Sans Georgian",sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.restart-btn:hover{opacity:.85;}
@media(max-width:540px){.stats-bar{grid-template-columns:repeat(2,1fr)}.question-card{padding:18px 14px}.q-text{font-size:15px}.option{font-size:13px;padding:11px 12px}}
</style>
</head>

, "±π/6+2πn", "π/3+πn"], "a": 0, "h": "arccos(½)=π/3", "f": "±π/3+2πn"},{"t": "ტრიგონომ. განტოლებები", "q": "tgx = 0 → x = ?", "o": ["π/2+πn", "2πn", "πn", "π/4+πn"], "a": 2, "h": "x=πn", "f": "πn"},{"t": "ტრიგონომ. განტოლებები", "q": "tgx = 1 → x = ?", "o": ["πn", "π/4+πn", "π/4+2πn", "π/2+πn"], "a": 1, "h": "x=π/4+πn", "f": "π/4+πn"},{"t": "ტრიგონომ. განტოლებები", "q": "tgx = a → x = ?", "o": ["arctan(a)+2πn", "±arctan(a)+πn", "arctan(a)+πn", "(−1)ⁿarctan(a)+πn"], "a": 2, "h": "arctan(a)+πn", "f": "arctan(a)+πn"},{"t": "ტრიგონომ. განტოლებები", "q": "tgx = √3 → x = ?", "o": ["π/6+πn", "π/3+πn", "π/4+πn", "π/3+2πn"], "a": 1, "h": "arctan(√3)=π/3", "f": "π/3+πn"},{"t": "ტრიგონომ. განტოლებები", "q": "ctgx = a → x = ?", "o": ["arctan(a)+πn", "π−arcctg(a)+πn", "arcctg(a)+πn", "±arcctg(a)+πn"], "a": 2, "h": "arcctg(a)+πn", "f": "arcctg(a)+πn"}];
const L=['A','B','C','D'];
let questions=[],current=0,correct=0,wrong=0,answered=false,selTopics=new Set();
const topics=[...new Set(Q.map(q=>q.t))];
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function init(){
  const pool=selTopics.size===0?Q:Q.filter(q=>selTopics.has(q.t));
  questions=shuffle(pool);current=0;correct=0;wrong=0;answered=false;
  updateStats();renderQ();
  document.getElementById('score-screen').classList.remove('show');
  document.getElementById('quiz-area').style.display='';
}
function updateStats(){
  document.getElementById('sc').textContent=correct;
  document.getElementById('sw').textContent=wrong;
  const t=correct+wrong;
  document.getElementById('ss').textContent=t?Math.round(correct/t*100)+'%':'—';
  document.getElementById('sp').textContent=current+'/'+questions.length;
  document.getElementById('pf').style.width=(questions.length?current/questions.length*100:0)+'%';
}
function renderQ(){
  if(current>=questions.length){showScore();return;}
  answered=false;
  const q=questions[current];
  const order=shuffle([0,1,2,3]);
  const correctShuffled=order.indexOf(q.a);
  const opts=order.map((oi,i)=>`<button class="option" onclick="answer(${i})" id="o${i}"><span class="option-letter">${L[i]}</span><span>${q.o[oi]}</span></button>`).join('');
  document.getElementById('quiz-area').innerHTML=`<div class="question-card" data-correct="${correctShuffled}"><div class="q-meta"><span class="q-topic-tag">${q.t}</span><span class="q-counter">#${current+1} / ${questions.length}</span></div><div class="q-text">${q.q}</div><div class="options">${opts}</div><div class="feedback" id="fb"></div></div><button class="next-btn" id="nb" onclick="nextQ()">${current+1<questions.length?'შემდეგი →':'შედეგები →'}</button>`;
}
function answer(idx){
  if(answered)return; answered=true;
  const q=questions[current];
  const correctIdx=parseInt(document.querySelector('.question-card').dataset.correct);
  document.querySelectorAll('.option').forEach(o=>o.disabled=true);
  const fb=document.getElementById('fb');
  if(idx===correctIdx){
    document.getElementById('o'+idx).classList.add('correct');correct++;
    fb.className='feedback correct-fb show';
    fb.innerHTML='<strong>✓ სწორია!</strong>'+q.h+'<span class="formula">'+q.f+'</span>';
  }else{
    document.getElementById('o'+idx).classList.add('wrong');
    document.getElementById('o'+correctIdx).classList.add('correct');wrong++;
    fb.className='feedback wrong-fb show';
    fb.innerHTML='<strong>✗ შეცდომა</strong>სწ.: <b>'+q.o[q.a]+'</b> — '+q.h+'<span class="formula">'+q.f+'</span>';
  }
  updateStats();
  document.getElementById('nb').classList.add('show');
}
function nextQ(){current++;updateStats();renderQ();}
function showScore(){
  document.getElementById('quiz-area').style.display='none';
  const p=Math.round(correct/questions.length*100);
  const ss=document.getElementById('score-screen');
  if(p===100){
    ss.innerHTML='<span class="score-emoji">🏆</span><div class="score-number">100%</div><div class="score-label">სრულყოფილი! სწ: '+correct+'/'+questions.length+'</div><button class="restart-btn" onclick="init()">🔄 თავიდან</button>';
  } else {
    const warns=['ჩაიში ხარ 🍵','იპონზე გდიხარ'];
    const w=warns[Math.floor(Math.random()*warns.length)];
    const e=p>=70?'😬':p>=50?'😰':'💀';
    ss.innerHTML='<span class="score-emoji">'+e+'</span><div class="score-number">'+p+'%</div><div class="score-label">სწ: '+correct+'/'+questions.length+'</div><div class="fail-warning">'+w+'</div><button class="restart-btn" onclick="init()">🔄 თავიდან</button>';
  }
  ss.classList.add('show');
}
const tf=document.getElementById('tf');
const ab=document.createElement('button');
ab.className='topic-btn active';ab.textContent='ყველა ('+Q.length+')';
ab.onclick=()=>{selTopics.clear();document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('active'));ab.classList.add('active');init();};
tf.appendChild(ab);
topics.forEach(t=>{
  const n=Q.filter(q=>q.t===t).length;
  const btn=document.createElement('button');
  btn.className='topic-btn';btn.textContent=t+' ('+n+')';
  btn.onclick=()=>{
    if(selTopics.has(t)){selTopics.delete(t);btn.classList.remove('active');}
    else{selTopics.add(t);btn.classList.add('active');ab.classList.remove('active');}
    if(selTopics.size===0)ab.classList.add('active');
    init();
  };
  tf.appendChild(btn);
});
init();
</script>
